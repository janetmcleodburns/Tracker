<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Action Items" />
  <meta name="theme-color" content="#f5f5f5" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Action Items</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f5; --bg2: #e8e8e8; --bg3: #f0f0f0;
      --border: #d8d8d8; --border2: #cccccc;
      --text: #1a1a2e; --text-dim: #888899; --text-mid: #555570; --text-muted: #999aaa;
      --accent: #4a4a70; --accent2: #8888b0;
      --red: #e03030; --amber: #cc8800; --green: #008855;
      --safe-bottom: env(safe-area-inset-bottom, 0px); --safe-top: env(safe-area-inset-top, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono','Courier New',monospace; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    #app { min-height: 100dvh; padding-top: calc(var(--safe-top) + 32px); padding-bottom: calc(var(--safe-bottom) + 40px); padding-left: 20px; padding-right: 20px; }
    .inner { max-width: 580px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .eyebrow { font-family: 'Playfair Display',serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
    h1 { font-family: 'Playfair Display',serif; font-size: clamp(28px,8vw,38px); font-weight: 900; letter-spacing: -0.02em; color: var(--text); margin-bottom: 4px; }
    .subtitle { display: flex; align-items: center; gap: 14px; margin-top: 8px; margin-bottom: 24px; }
    .subtitle-text { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; white-space: nowrap; }
    .progress-bar { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 1px; transition: width 0.4s ease; }

    /* Add panel */
    .add-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
    .add-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .add-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: 'DM Mono',monospace; font-size: 15px;
      padding: 12px 14px; outline: none; transition: border 0.2s; -webkit-appearance: none;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-muted); }

    /* Mic button */
    .mic-btn {
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer;
      font-size: 18px; padding: 10px 13px; line-height: 1; transition: all 0.2s; flex-shrink: 0;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .mic-btn:active { background: var(--border2); }
    .mic-btn.listening { background: #e0303015; border-color: var(--red); animation: pulse 1.2s ease-in-out infinite; }
    .mic-btn.no-support { opacity: 0.35; cursor: not-allowed; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 #e0303025; } 50% { box-shadow: 0 0 0 7px #e0303008; } }
    .mic-status { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-align: center; min-height: 16px; letter-spacing: 0.05em; }
    .mic-status.active { color: var(--red); }

    .add-controls { display: grid; grid-template-columns: repeat(3, auto) 1fr auto; align-items: center; gap: 7px; row-gap: 8px; }
    .add-controls .date-input { grid-column: 1 / 3; width: 100%; max-width: 100%; }
    .add-controls select.date-input { grid-column: 3 / 5; width: 100%; max-width: 100%; }
    .add-controls .add-btn { grid-column: 5; }
    @media (max-width: 420px) {
      .add-controls { grid-template-columns: 1fr 1fr 1fr; }
      .add-controls .date-input { grid-column: 1 / 3; }
      .add-controls select.date-input { grid-column: 3 / 4; }
      .add-controls .add-btn { grid-column: 1 / 4; margin-left: 0; width: 100%; }
    }
    .pill-btn {
      background: none; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer;
      font-family: 'DM Mono',monospace; font-size: 10px; letter-spacing: 0.1em;
      padding: 7px 10px; transition: all 0.15s; text-transform: uppercase; color: var(--text-mid);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .pill-btn.sel-high { background: #e0303018; border-color: var(--red); color: var(--red); }
    .pill-btn.sel-medium { background: #cc880018; border-color: var(--amber); color: var(--amber); }
    .pill-btn.sel-low { background: #00885518; border-color: var(--green); color: var(--green); }
    .date-input {
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text-mid); font-family: 'DM Mono',monospace; font-size: 11px;
      padding: 7px 10px; outline: none; transition: border 0.2s; max-width: 130px; -webkit-appearance: none;
    }
    .date-input:focus { border-color: var(--accent); }
    .add-btn {
      margin-left: auto; background: var(--accent); border: none; border-radius: 6px; cursor: pointer;
      font-family: 'DM Mono',monospace; font-size: 12px; font-weight: 500;
      padding: 8px 18px; color: #fff; transition: all 0.15s; letter-spacing: 0.05em; white-space: nowrap;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { opacity: 0.8; transform: scale(0.97); }

    /* Category manager */
    .cat-section { margin-bottom: 20px; }
    .cat-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; cursor: pointer; user-select: none; }
    .cat-section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-mid); }
    .cat-toggle { font-size: 11px; color: var(--text-muted); }
    .cat-manager { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .cat-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
    .cat-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; font-size: 11px; padding: 4px 10px; color: var(--text-mid); }
    .cat-tag-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; line-height: 1; padding: 0; touch-action: manipulation; }
    .cat-tag-del:active { color: var(--red); }
    .cat-add-row { display: flex; gap: 7px; }
    .cat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: 'DM Mono',monospace; font-size: 13px; padding: 7px 10px; outline: none; transition: border 0.2s; -webkit-appearance: none; }
    .cat-input:focus { border-color: var(--accent); }
    .cat-input::placeholder { color: var(--text-muted); }
    .cat-add-btn { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 12px; padding: 7px 14px; color: var(--text-mid); touch-action: manipulation; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .cat-add-btn:active { background: var(--border2); }

    /* Filters */
    .filter-row { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
    .filter-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 11px; letter-spacing: 0.1em; padding: 6px 12px; border-radius: 20px; text-transform: uppercase; transition: all 0.2s; color: var(--text-muted); touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .filter-btn.active-filter { background: var(--accent); color: #fff; }
    .filter-count { opacity: 0.7; }
    .cat-filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .cat-filter-btn { background: none; border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 10px; letter-spacing: 0.08em; padding: 4px 11px; transition: all 0.15s; text-transform: uppercase; color: var(--text-muted); touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .cat-filter-btn.active-cat-filter { background: #4a4a7018; border-color: var(--accent); color: var(--accent); }

    hr.rule { border: none; border-top: 1px solid var(--border); margin: 0 0 2px; }

    /* List */
    .list { padding-top: 2px; }
    .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--border); animation: fadeIn 0.22s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .priority-dot { width: 7px; height: 7px; min-width: 7px; border-radius: 50%; margin-top: 6px; }
    .check-btn { width: 20px; height: 20px; min-width: 20px; border-radius: 5px; margin-top: 1px; border: 1.5px solid var(--border2); background: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .check-btn.done-check { background: var(--accent); border-color: var(--accent); }
    .item-body { flex: 1; min-width: 0; }
    .item-text { font-size: 14px; line-height: 1.5; word-break: break-word; color: var(--text); }
    .item-text.done-text { color: var(--text-muted); text-decoration: line-through; }
    .edit-input { width: 100%; background: var(--bg3); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); font-family: 'DM Mono',monospace; font-size: 14px; padding: 4px 8px; outline: none; }
    .item-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .due-chip { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; }
    .due-chip.overdue { color: var(--red); }
    .item-cat-tag { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; background: #4a4a7012; border: 1px solid #4a4a7040; border-radius: 10px; padding: 2px 8px; color: var(--accent); }
    .item-actions { display: flex; gap: 2px; margin-top: 2px; }
    .action-btn { background: none; border: none; cursor: pointer; padding: 3px 7px; font-size: 11px; color: var(--text-muted); transition: color 0.15s; font-family: 'DM Mono',monospace; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .action-btn:active { color: var(--text-mid); }
    .action-btn.del:active { color: var(--red); }
    .empty-state { text-align: center; padding: 56px 20px; color: var(--border2); font-size: 13px; letter-spacing: 0.05em; }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.5; }

    /* Replicate modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; width: 100%; max-width: 380px; }
    .modal-title { font-family: 'Playfair Display',serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .modal-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; letter-spacing: 0.05em; }
    .modal-task { font-size: 13px; color: var(--text-mid); background: var(--bg2); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; line-height: 1.4; }
    .modal-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 6px; }
    .modal-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .modal-cat-btn { background: none; border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 11px; padding: 5px 13px; color: var(--text-mid); transition: all 0.15s; touch-action: manipulation; }
    .modal-cat-btn.selected { background: #4a4a7018; border-color: var(--accent); color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; }
    .modal-cancel { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 12px; padding: 10px; color: var(--text-mid); touch-action: manipulation; }
    .modal-confirm { flex: 2; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 12px; padding: 10px; color: #fff; touch-action: manipulation; }
    .modal-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Email button */
    .email-btn { background: none; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; font-family: 'DM Mono',monospace; font-size: 11px; letter-spacing: 0.08em; padding: 7px 12px; color: var(--text-mid); transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .email-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .email-btn.sent { border-color: var(--green) !important; color: var(--green) !important; }
    .email-btn.err { border-color: var(--red) !important; color: var(--red) !important; }
    .email-btn:not(:disabled):active { background: var(--bg2); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    .error-msg { font-size: 11px; color: var(--red); text-align: right; margin-bottom: 6px; }
  </style>
</head>
<body>
<div id="app">
  <div class="inner">
    <div class="topbar">
      <span class="eyebrow">Your</span>
      <button class="email-btn" id="emailBtn" onclick="handleSendEmail()"><span>✉</span> Email to myself</button>
    </div>
    <div id="emailError" class="error-msg" style="display:none"></div>
    <h1>Action Items</h1>
    <div class="subtitle">
      <span class="subtitle-text" id="subtitleText">0 remaining · 0 done</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Add panel -->
    <div class="add-panel">
      <div class="add-input-row">
        <input class="add-input" id="addInput" placeholder="Add an action item…" onkeydown="if(event.key==='Enter')addItem()" />
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Tap to speak">🎤</button>
      </div>
      <div class="mic-status" id="micStatus"></div>
      <div class="add-controls">
        <button class="pill-btn" id="pb-high" onclick="setPriority('high')">High</button>
        <button class="pill-btn sel-medium" id="pb-medium" onclick="setPriority('medium')">Med</button>
        <button class="pill-btn" id="pb-low" onclick="setPriority('low')">Low</button>
        <input type="date" class="date-input" id="dateInput" />
        <select class="date-input" id="catSelect" style="max-width:120px;cursor:pointer;">
          <option value="">Category…</option>
        </select>
        <button class="add-btn" onclick="addItem()">+ Add</button>
      </div>
    </div>

    <!-- Category manager -->
    <div class="cat-section">
      <div class="cat-section-header" onclick="toggleCatManager()">
        <span class="cat-section-title">Categories</span>
        <span class="cat-toggle" id="catToggleIcon">▸ manage</span>
      </div>
      <div id="catManager" style="display:none">
        <div class="cat-manager">
          <div class="cat-list" id="catList"></div>
          <div class="cat-add-row">
            <input class="cat-input" id="catInput" placeholder="New category…" onkeydown="if(event.key==='Enter')addCategory()" maxlength="30" />
            <button class="cat-add-btn" onclick="addCategory()">+ Add</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Status filters -->
    <div class="filter-row">
      <button class="filter-btn active-filter" id="fb-all" onclick="setFilter('all')">All <span class="filter-count" id="fc-all"></span></button>
      <button class="filter-btn" id="fb-active" onclick="setFilter('active')">Active <span class="filter-count" id="fc-active"></span></button>
      <button class="filter-btn" id="fb-done" onclick="setFilter('done')">Done <span class="filter-count" id="fc-done"></span></button>
    </div>
    <div class="cat-filter-row" id="catFilterRow"></div>
    <hr class="rule" />
    <div class="list" id="list"></div>
  </div>
</div>

<!-- Replicate modal -->
<div class="modal-overlay" id="replicateModal" style="display:none" onclick="closeReplicate(event)">
  <div class="modal">
    <div class="modal-title">Replicate Task</div>
    <div class="modal-sub">Copy this task to another category</div>
    <div class="modal-task" id="modalTaskText"></div>
    <div class="modal-label">Choose category</div>
    <div class="modal-cats" id="modalCats"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeReplicateBtn()">Cancel</button>
      <button class="modal-confirm" id="modalConfirm" onclick="confirmReplicate()" disabled>Replicate</button>
    </div>
  </div>
</div>

<script>
  const PRIORITY_COLORS = {
    high:   { dot: '#e03030', shadow: '#e0303044' },
    medium: { dot: '#cc8800', shadow: '#cc880044' },
    low:    { dot: '#008855', shadow: '#00885544' },
  };

  let items = [], categories = [];
  let filter = 'all', catFilter = '', priority = 'medium';
  let editId = null, catManagerOpen = false;

  // --- Storage ---
  function load() {
    try { items = JSON.parse(localStorage.getItem('action-items') || '[]'); } catch { items = []; }
    try { categories = JSON.parse(localStorage.getItem('action-cats') || '["Work","Personal","Home"]'); } catch { categories = ['Work','Personal','Home']; }
  }
  function save() {
    try {
      const itemsJson = JSON.stringify(items);
      localStorage.setItem('action-items', itemsJson);
    } catch(e) { console.warn('Save failed:', e); }
    try { localStorage.setItem('action-cats', JSON.stringify(categories)); } catch {}
  }
  function generateId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

  // --- Mic / Speech Recognition ---
  let recognition = null;
  let isListening = false;

  function initMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const btn = document.getElementById('micBtn');
    if (!SpeechRecognition) {
      btn.classList.add('no-support');
      btn.title = 'Speech recognition not supported in this browser';
      return;
    }
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      isListening = true;
      btn.classList.add('listening');
      setMicStatus('🔴 Listening… speak your task', true);
    };
    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('addInput').value = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        setMicStatus('✓ Got it — tap + Add or edit above', false);
      }
    };
    recognition.onerror = (e) => {
      const msgs = { 'not-allowed': 'Microphone permission denied', 'no-speech': 'No speech detected', 'network': 'Network error' };
      setMicStatus(msgs[e.error] || 'Error: ' + e.error, false);
      stopMic();
    };
    recognition.onend = () => { stopMic(); };
  }

  function toggleMic() {
    if (!recognition) { setMicStatus('Not supported in this browser', false); return; }
    if (isListening) { recognition.stop(); } else { recognition.start(); }
  }

  function stopMic() {
    isListening = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('listening');
    setTimeout(() => setMicStatus('', false), 3000);
  }

  function setMicStatus(msg, active) {
    const el = document.getElementById('micStatus');
    el.textContent = msg;
    el.className = 'mic-status' + (active ? ' active' : '');
  }

  // --- Priority ---
  function setPriority(p) {
    priority = p;
    ['high','medium','low'].forEach(x => {
      document.getElementById('pb-' + x).className = 'pill-btn' + (x === p ? ' sel-' + x : '');
    });
  }

  // --- Categories ---
  function toggleCatManager() {
    catManagerOpen = !catManagerOpen;
    document.getElementById('catManager').style.display = catManagerOpen ? 'block' : 'none';
    document.getElementById('catToggleIcon').textContent = catManagerOpen ? '▾ manage' : '▸ manage';
  }
  function addCategory() {
    const input = document.getElementById('catInput');
    const name = input.value.trim();
    if (!name || categories.includes(name)) { input.value = ''; return; }
    categories.push(name); input.value = '';
    save(); renderCategoryManager(); renderCatFilter(); renderCatSelect();
  }
  function deleteCategory(name) {
    categories = categories.filter(c => c !== name);
    items.forEach(i => { if (i.category === name) i.category = ''; });
    if (catFilter === name) catFilter = '';
    save(); renderCategoryManager(); renderCatFilter(); renderCatSelect(); render();
  }
  function renderCategoryManager() {
    const list = document.getElementById('catList');
    if (categories.length === 0) { list.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">No categories yet.</span>'; return; }
    list.innerHTML = categories.map(c => `<span class="cat-tag">${escHtml(c)}<button class="cat-tag-del" onclick="deleteCategory('${escHtml(c)}')" title="Delete">✕</button></span>`).join('');
  }
  function renderCatSelect() {
    const sel = document.getElementById('catSelect');
    const val = sel.value;
    sel.innerHTML = '<option value="">Category…</option>' + categories.map(c => `<option value="${escHtml(c)}" ${val===c?'selected':''}>${escHtml(c)}</option>`).join('');
  }
  function renderCatFilter() {
    const row = document.getElementById('catFilterRow');
    if (categories.length === 0) { row.innerHTML = ''; return; }
    row.innerHTML = categories.map(c => `<button class="cat-filter-btn ${catFilter.trim().toLowerCase()===c.trim().toLowerCase()?'active-cat-filter':''}" onclick="setCatFilter('${escHtml(c)}')">${escHtml(c)}</button>`).join('');
  }
  function setCatFilter(c) { catFilter = catFilter.trim().toLowerCase() === c.trim().toLowerCase() ? '' : c.trim(); renderCatFilter(); render(); }

  // --- Status filter ---
  function setFilter(f) {
    filter = f;
    ['all','active','done'].forEach(x => { document.getElementById('fb-' + x).className = 'filter-btn' + (x===f?' active-filter':''); });
    render();
  }

  // --- Add / Toggle / Delete / Edit ---
  function addItem() {
    const input = document.getElementById('addInput');
    const text = input.value.trim();
    if (!text) return;
    const dueDate = document.getElementById('dateInput').value;
    const category = document.getElementById('catSelect').value;
    const newItem = { id: generateId(), text, priority, done: false, dueDate, category, createdAt: Date.now() };
    items.unshift(newItem);
    input.value = ''; document.getElementById('dateInput').value = ''; document.getElementById('catSelect').value = '';
    setMicStatus('', false);
    save();
    // Always show all items after adding so new item is always visible
    filter = 'all';
    catFilter = '';
    ['all','active','done'].forEach(x => {
      document.getElementById('fb-' + x).className = 'filter-btn' + (x === 'all' ? ' active-filter' : '');
    });
    renderCatFilter();
    render();
    input.focus();
  }
  function toggleDone(id) { const item = items.find(i => i.id===id); if (item) { item.done = !item.done; save(); render(); } }
  function deleteItem(id) { items = items.filter(i => i.id!==id); save(); render(); }
  function startEdit(id) { editId = id; render(); const inp = document.getElementById('edit-'+id); if (inp) { inp.focus(); inp.select(); } }
  function saveEdit(id) {
    const inp = document.getElementById('edit-'+id); if (!inp) return;
    const text = inp.value.trim();
    if (text) { const item = items.find(i => i.id===id); if (item) item.text = text; }
    editId = null; save(); render();
  }
  function editKeydown(e, id) { if (e.key==='Enter') saveEdit(id); if (e.key==='Escape') { editId=null; render(); } }

  // --- Render ---
  function render() {
    const today = new Date().toISOString().slice(0,10);
    const pOrder = { high:0, medium:1, low:2 };
    const all = items.length, doneCount = items.filter(i=>i.done).length, active = all - doneCount;
    document.getElementById('subtitleText').textContent = `${active} remaining · ${doneCount} done`;
    document.getElementById('progressFill').style.width = all ? `${(doneCount/all)*100}%` : '0%';
    document.getElementById('fc-all').textContent = all ? `(${all})` : '';
    document.getElementById('fc-active').textContent = active ? `(${active})` : '';
    document.getElementById('fc-done').textContent = doneCount ? `(${doneCount})` : '';
    const visible = items.filter(i => {
      const statusOk = filter==='active' ? !i.done : filter==='done' ? i.done : true;
      const catOk = catFilter ? (i.category||'').trim().toLowerCase() === catFilter.trim().toLowerCase() : true;
      return statusOk && catOk;
    }).sort((a,b) => { if (a.done!==b.done) return a.done?1:-1; return pOrder[a.priority]-pOrder[b.priority]; });
    const list = document.getElementById('list');
    if (visible.length===0) {
      const msg = catFilter ? `No ${filter==='done'?'completed':filter==='active'?'active':''} items in "${catFilter}".`
        : filter==='done' ? 'Nothing completed yet.' : filter==='active' ? 'All clear — nothing pending.' : 'No items yet.';
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">◇</div><div>${msg}</div></div>`; return;
    }
    list.innerHTML = visible.map(item => {
      const pc = PRIORITY_COLORS[item.priority];
      const isOverdue = item.dueDate && !item.done && item.dueDate < today;
      const checkClass = item.done ? 'check-btn done-check' : 'check-btn';
      const checkmark = item.done ? `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : '';
      const textContent = editId===item.id
        ? `<input class="edit-input" id="edit-${item.id}" value="${item.text.replace(/"/g,'&quot;')}" onkeydown="editKeydown(event,'${item.id}')" onblur="saveEdit('${item.id}')" />`
        : `<div class="item-text ${item.done?'done-text':''}" ondblclick="${!item.done?`startEdit('${item.id}')`:''}"> ${escHtml(item.text)}</div>`;
      const dueHtml = item.dueDate ? `<span class="due-chip ${isOverdue?'overdue':''}">${isOverdue?'⚠ ':''}Due ${item.dueDate}</span>` : '';
      const catHtml = item.category ? `<span class="item-cat-tag">${escHtml(item.category)}</span>` : '';
      const metaHtml = (dueHtml||catHtml) ? `<div class="item-meta">${catHtml}${dueHtml}</div>` : '';
      const editBtn = !item.done ? `<button class="action-btn" onclick="startEdit('${item.id}')">edit</button>` : '';
      const replicateBtn = `<button class="action-btn" onclick="openReplicate('${item.id}')" title="Replicate for another category">⧉</button>`;
      return `<div class="item-row">
        <div class="priority-dot" style="background:${pc.dot};box-shadow:0 0 5px ${pc.shadow}"></div>
        <button class="${checkClass}" onclick="toggleDone('${item.id}')">${checkmark}</button>
        <div class="item-body">${textContent}${metaHtml}</div>
        <div class="item-actions">${editBtn}${replicateBtn}<button class="action-btn del" onclick="deleteItem('${item.id}')">✕</button></div>
      </div>`;
    }).join('');
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // --- Email ---
  async function handleSendEmail() {
    const btn = document.getElementById('emailBtn'), errEl = document.getElementById('emailError');
    if (items.length===0) return;
    btn.disabled=true; btn.className='email-btn'; btn.innerHTML='<span class="spin">⟳</span> Sending…'; errEl.style.display='none';
    try {
      const active=items.filter(i=>!i.done), done=items.filter(i=>i.done);
      const emoji={high:'🔴',medium:'🟡',low:'🟢'};
      const fmt=list=>list.map(i=>`  ${emoji[i.priority]} [${i.priority.toUpperCase()}]${i.category?' ['+i.category+']':''} ${i.text}${i.dueDate?' — Due: '+i.dueDate:''}`).join('\n');
      const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      const body=`Action Items Summary — ${today}\n\n📋 ACTIVE (${active.length})\n${'─'.repeat(40)}\n${active.length?fmt(active):'  All clear!'}\n\n`+(done.length?`✅ COMPLETED (${done.length})\n${'─'.repeat(40)}\n${fmt(done)}\n\n`:'')+`─────────────────────────────────────────\nSent from your Action Items app`;
      const prompt=`You are an email-sending assistant with access to Microsoft 365 Outlook. Send an email to the currently signed-in user (me) with Subject: "Action Items — ${today}" and this plain text body (preserve formatting exactly):\n${body}\n\nUse the Outlook send email tool. Just send it directly.`;
      const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,mcp_servers:[{type:'url',url:'https://microsoft365.mcp.claude.com/mcp',name:'microsoft365'}],messages:[{role:'user',content:prompt}]})});
      const data=await response.json();
      if (!response.ok) throw new Error(data.error?.message||'API error');
      const toolCalls=data.content.filter(b=>b.type==='mcp_tool_use');
      const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join(' ').toLowerCase();
      if (toolCalls.length===0&&!text.includes('sent')) throw new Error('Could not send — make sure Microsoft 365 is connected in Claude.');
      btn.className='email-btn sent'; btn.innerHTML='✓ Sent to Outlook!';
      setTimeout(()=>{btn.disabled=false;btn.className='email-btn';btn.innerHTML='<span>✉</span> Email to myself';},3000);
    } catch(e) {
      btn.className='email-btn err'; btn.innerHTML='✕ Failed'; errEl.textContent=e.message; errEl.style.display='block';
      setTimeout(()=>{btn.disabled=false;btn.className='email-btn';btn.innerHTML='<span>✉</span> Email to myself';errEl.style.display='none';},6000);
    }
  }

  // --- Replicate ---
  let replicateSourceId = null;
  let replicateTargetCat = null;

  function openReplicate(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    replicateSourceId = id;
    replicateTargetCat = null;
    document.getElementById('modalTaskText').textContent = item.text;
    const catsEl = document.getElementById('modalCats');
    if (categories.length === 0) {
      catsEl.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">No categories yet — add some first.</span>';
    } else {
      catsEl.innerHTML = categories.map(c =>
        `<button class="modal-cat-btn ${c === item.category ? 'selected' : ''}" onclick="selectReplicateCat('${escHtml(c)}')" id="rcat-${escHtml(c)}">${escHtml(c)}</button>`
      ).join('');
      // Pre-select if only one other category exists
      if (categories.length === 1) selectReplicateCat(categories[0]);
    }
    document.getElementById('modalConfirm').disabled = true;
    document.getElementById('replicateModal').style.display = 'flex';
  }

  function selectReplicateCat(c) {
    replicateTargetCat = c;
    document.querySelectorAll('.modal-cat-btn').forEach(btn => btn.classList.remove('selected'));
    const btn = document.getElementById('rcat-' + c);
    if (btn) btn.classList.add('selected');
    document.getElementById('modalConfirm').disabled = false;
  }

  function confirmReplicate() {
    if (!replicateSourceId || !replicateTargetCat) return;
    const source = items.find(i => i.id === replicateSourceId);
    if (!source) return;
    const copy = { ...source, id: generateId(), category: replicateTargetCat, done: false, createdAt: Date.now() };
    items.unshift(copy);
    save(); render();
    closeReplicateBtn();
  }

  function closeReplicate(e) { if (e.target === document.getElementById('replicateModal')) closeReplicateBtn(); }
  function closeReplicateBtn() {
    document.getElementById('replicateModal').style.display = 'none';
    replicateSourceId = null; replicateTargetCat = null;
  }

  // --- Init ---
  window.addEventListener('load', function() {
    setPriority('medium'); load(); renderCategoryManager(); renderCatFilter(); renderCatSelect(); render(); initMic();
  });
</script>
</body>
</html>
